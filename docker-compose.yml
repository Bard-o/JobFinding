services:
  postgres:
    image: postgres:15
    container_name: jobfinding_postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-jobfinding}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-jobfinding}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-jobfinding}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: docker/backend.Dockerfile
    container_name: jobfinding_backend
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-jobfinding}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-jobfinding}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    ports:
      - "${BACKEND_PORT:-8000}:8000"

  scraper:
    build:
      context: .
      dockerfile: docker/scraper.Dockerfile
    profiles:
      - job
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-jobfinding}:${POSTGRES_PASSWORD:-changeme}@postgres:5432/${POSTGRES_DB:-jobfinding}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}

  frontend:
    build:
      context: .
      dockerfile: docker/frontend.Dockerfile
    container_name: jobfinding_frontend
    restart: always
    ports:
      - "${FRONTEND_PORT:-3000}:80"

volumes:
  postgres_data: